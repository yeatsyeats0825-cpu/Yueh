
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#3B6FD4;--primary-light:#E8EEFB;--danger:#E24B4A;--danger-light:#FCEBEB;--bg:#F7F8FA;--surface:#FFFFFF;--border:rgba(0,0,0,0.12);--border-md:rgba(0,0,0,0.22);--text:#1A1A1A;--text-muted:#666;--text-hint:#999;--radius:14px;--radius-sm:10px;--fs-label:15px;--card-img:112px;--card-emoji:62px;--card-min-h:170px;}
.app{display:flex;flex-direction:column;min-height:700px;background:var(--bg)}
.toolbar{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:8px;margin-right:auto}
.board-title{font-size:20px;font-weight:500;color:var(--text);cursor:pointer;border-bottom:1.5px dashed transparent;padding-bottom:1px;transition:border-color 0.15s}
.board-title:hover{border-bottom-color:var(--primary)}
.title-edit-wrap{display:none;align-items:center;gap:6px}
.title-edit-wrap.visible{display:flex}
.title-input{font-size:20px;font-weight:500;padding:3px 8px;border:0.5px solid var(--primary);border-radius:6px;color:var(--text);background:var(--surface);width:200px}
.title-char{font-size:12px;color:var(--text-muted)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border-md);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;transition:background 0.15s;white-space:nowrap}
.btn:hover{background:var(--bg)}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn.primary:hover{background:#2e5ab8}
.btn.ghost{border-color:var(--border);color:var(--text-muted)}
.btn.ghost:hover{background:var(--bg);color:var(--text)}
.btn.danger-outline{border-color:var(--danger);color:var(--danger)}
.btn.danger-outline:hover{background:var(--danger-light)}
.fs-group{display:flex;border:0.5px solid var(--border-md);border-radius:var(--radius-sm);overflow:hidden}
.fs-btn{padding:7px 11px;font-size:13px;background:var(--surface);border:none;cursor:pointer;color:var(--text-muted);transition:background 0.15s;border-right:0.5px solid var(--border)}
.fs-btn:last-child{border-right:none}
.fs-btn.active{background:var(--primary-light);color:var(--primary);font-weight:500}
.edit-mode-bar{display:none;align-items:center;gap:8px;padding:9px 16px;background:#FFF8E1;border-bottom:0.5px solid #F0C060;font-size:14px;color:#7A5C00;flex-shrink:0}
.edit-mode-bar.visible{display:flex}
.nav-bar{display:flex;align-items:center;gap:8px;padding:9px 16px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:14px;color:var(--text-muted);flex:1;flex-wrap:wrap}
.breadcrumb span.link{cursor:pointer;color:var(--primary)}
.breadcrumb span.link:hover{text-decoration:underline}
.breadcrumb .sep{color:var(--text-hint)}
.sentence-bar{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;min-height:62px}
.sentence-bar-label{font-size:13px;color:var(--text-muted);white-space:nowrap}
.sentence-tokens{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.token{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:var(--primary-light);border-radius:20px;font-size:14px;color:var(--primary)}
.token button{background:none;border:none;color:var(--primary);cursor:pointer;font-size:15px;line-height:1;padding:0}
.sentence-actions{display:flex;gap:7px;flex-shrink:0}
.board{flex:1;overflow-y:auto;padding:16px}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.card{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:14px 8px 10px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s,opacity 0.15s;min-height:var(--card-min-h);text-align:center;user-select:none}
.card:hover{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.card.folder{border-width:2px}
.card.folder:hover{filter:brightness(0.95)}
.card-img{width:var(--card-img);height:var(--card-img);object-fit:cover;border-radius:8px;pointer-events:none}
.card-emoji{font-size:var(--card-emoji);line-height:1;pointer-events:none}
.card-label{font-size:var(--fs-label);font-weight:500;color:var(--text);word-break:break-all;pointer-events:none}
.card-edit-overlay{display:none;position:absolute;inset:0;border-radius:var(--radius);background:rgba(59,111,212,0.05);border:2px solid var(--primary)}
body.edit-mode .card-edit-overlay{display:block}
body.edit-mode .card{cursor:grab}
body.edit-mode .card:active{cursor:grabbing}
.card-edit-btns{display:none;position:absolute;bottom:6px;left:0;right:0;justify-content:center;gap:6px;z-index:2}
body.edit-mode .card-edit-btns{display:flex}
.card.dragging{opacity:0.35;box-shadow:none !important;border-style:dashed !important}
.card.drag-over{border-color:var(--primary) !important;box-shadow:0 0 0 3px var(--primary-light) !important;background:var(--primary-light) !important}
.drag-handle{position:absolute;top:6px;left:6px;font-size:14px;color:var(--text-hint);display:none;cursor:grab;z-index:2;line-height:1}
body.edit-mode .drag-handle{display:block}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:500;margin-bottom:18px;color:var(--text)}
.form-group{margin-bottom:15px}
.form-group label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:5px}
.form-group input[type=text]{width:100%;padding:10px 12px;border:0.5px solid var(--border-md);border-radius:var(--radius-sm);font-size:15px;background:var(--surface);color:var(--text)}
.form-group input[type=text]:focus{outline:2px solid var(--primary);border-color:transparent}
.emoji-preview-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:var(--radius-sm);border:0.5px solid var(--border)}
.emoji-big{font-size:52px;line-height:1;width:70px;text-align:center;flex-shrink:0}
.emoji-status{flex:1}
.emoji-status-label{font-size:12px;color:var(--text-muted)}
.emoji-status-value{font-size:14px;color:var(--text);margin-top:2px}
.color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-top:6px}
.color-swatch{width:100%;aspect-ratio:1;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform 0.1s,border-color 0.1s}
.color-swatch:hover{transform:scale(1.1)}
.color-swatch.selected{border-color:var(--primary);transform:scale(1.08)}
.upload-box{border:1.5px dashed var(--border-md);border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;color:var(--text-muted);font-size:14px;transition:all 0.15s}
.upload-box:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.upload-box input{display:none}
.preview-wrap{display:flex;align-items:center;justify-content:center;margin-top:10px;gap:10px}
.preview-img{width:100px;height:100px;object-fit:cover;border-radius:10px;border:0.5px solid var(--border)}
.divider{border:none;border-top:0.5px solid var(--border);margin:14px 0}
.or-label{display:block;text-align:center;font-size:12px;color:var(--text-hint);margin-bottom:10px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;padding-top:14px;border-top:0.5px solid var(--border)}
.audio-row{display:flex;align-items:center;gap:8px}
.fname{font-size:13px;color:var(--text-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.confirm-modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:100%;max-width:340px}
.confirm-modal p{font-size:15px;color:var(--text);margin-bottom:20px;line-height:1.6}
</style>

<div class="app" id="app">
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="board-title" id="board-title">AAC 溝通板</span>
      <div class="title-edit-wrap" id="title-edit-wrap">
        <input class="title-input" id="title-input" maxlength="20">
        <span class="title-char" id="title-char">0/20</span>
        <button class="btn primary" style="padding:5px 10px;font-size:13px" id="btn-title-save">儲存</button>
        <button class="btn ghost" style="padding:5px 10px;font-size:13px" id="btn-title-cancel">取消</button>
      </div>
    </div>
    <div class="fs-group">
      <button class="fs-btn active" onclick="setFontSize('normal',this)">標準</button>
      <button class="fs-btn" onclick="setFontSize('large',this)">加大</button>
      <button class="fs-btn" onclick="setFontSize('xlarge',this)">特大</button>
    </div>
    <button class="btn ghost" id="btn-edit-mode">✎ 編輯模式</button>
    <button class="btn" id="btn-new-folder">＋ 新增資料夾</button>
    <button class="btn primary" id="btn-new-card">＋ 新增圖卡</button>
  </div>
  <div class="edit-mode-bar" id="edit-mode-bar">
    <b>編輯模式</b>：可拖曳圖卡調整順序，或點選編輯／刪除
    <button class="btn ghost" style="margin-left:auto;padding:5px 12px;font-size:13px" id="btn-exit-edit">完成</button>
  </div>
  <div class="nav-bar">
    <button class="btn ghost" id="btn-home" style="padding:6px 12px">⌂ 首頁</button>
    <button class="btn ghost" id="btn-back" style="padding:6px 12px">← 上一頁</button>
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div class="sentence-bar">
    <span class="sentence-bar-label">句子：</span>
    <div class="sentence-tokens" id="sentence-tokens"></div>
    <div class="sentence-actions">
      <button class="btn" id="btn-speak-sentence">▶ 朗讀</button>
      <button class="btn ghost" id="btn-clear-sentence">清除</button>
    </div>
  </div>
  <div class="board"><div class="grid" id="grid"></div></div>
</div>

<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <h2 id="modal-title">新增圖卡</h2>
    <div class="form-group"><label>標籤名稱</label><input type="text" id="f-label"></div>
    <div class="form-group">
      <label>預覽圖示</label>
      <div class="emoji-preview-row">
        <div class="emoji-big" id="emoji-preview-big">❓</div>
        <div class="emoji-status">
          <div class="emoji-status-label" id="emoji-status-label">輸入名稱後自動對應</div>
          <div class="emoji-status-value" id="emoji-status-value"></div>
        </div>
      </div>
    </div>
    <div class="form-group" id="fg-color" style="display:none"><label>資料夾底色</label><div class="color-grid" id="color-grid"></div></div>
    <hr class="divider"><span class="or-label">上傳自訂圖片（將取代 emoji）</span>
    <div class="form-group">
      <div class="upload-box" onclick="document.getElementById('f-img').click()">點擊選擇圖片檔案<input type="file" id="f-img" accept="image/*"></div>
      <div class="preview-wrap" id="img-preview-wrap" style="display:none">
        <img id="img-preview" class="preview-img">
        <button class="btn ghost" style="font-size:12px" id="btn-remove-img">移除圖片</button>
      </div>
    </div>
    <div class="form-group" id="fg-audio">
      <label>語音（上傳 WAV/MP3，或留空自動合成）</label>
      <div class="audio-row">
        <div class="upload-box" style="flex:1;padding:12px" onclick="document.getElementById('f-audio').click()">點擊選擇語音檔案（.wav / .mp3）<input type="file" id="f-audio" accept=".wav,.mp3,audio/*"></div>
        <button class="btn ghost" id="btn-clear-audio">清除</button>
      </div>
      <div class="audio-row" style="margin-top:8px">
        <span class="fname" id="audio-fname">尚未選擇（將使用語音合成）</span>
        <button class="btn ghost" id="btn-preview-audio" style="display:none">▶ 試聽</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="modal-cancel">取消</button>
      <button class="btn primary" id="modal-save">儲存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="confirm-modal" style="display:none">
  <div class="confirm-modal">
    <h2>確認刪除</h2><p id="confirm-msg"></p>
    <div class="modal-footer" style="border-top:none;padding-top:0;margin-top:0">
      <button class="btn" id="confirm-cancel">取消</button>
      <button class="btn danger-outline" id="confirm-ok">刪除</button>
    </div>
  </div>
</div>

function lookupEmoji(input){
  if(!input||!input.trim())return DEFAULT_EMOJI;
  const q=input.trim();
  for(const[w,e]of EMOJI_MAP){if(w===q)return e;}
  for(const[w,e]of EMOJI_MAP){if(q.includes(w)||w.includes(q))return e;}
  let best=null,bestScore=0;
  for(const[w,e]of EMOJI_MAP){let s=0;for(const ch of q){if(w.includes(ch))s++;}if(s>bestScore){bestScore=s;best=e;}}
  return bestScore>0?best:DEFAULT_EMOJI;
}

  for(let i=0;i<state.path.length;i++){node=node.children.find(c=>c.id===state.path[i]);parts.push({label:node.label,idx:i});}

function shadeColor(hex,pct){const n=parseInt(hex.slice(1),16);const r=Math.min(255,Math.max(0,((n>>16)&0xff)+pct));const g=Math.min(255,Math.max(0,((n>>8)&0xff)+pct));const b=Math.min(255,Math.max(0,(n&0xff)+pct));return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function render(){
  renderBreadcrumb();renderSentence();
  const folder=currentFolder(),grid=document.getElementById('grid');
  grid.innerHTML='';
  (folder.children||[]).forEach(item=>{
    const div=document.createElement('div');
    div.className='card'+(item.type==='folder'?' folder':'');
    div.dataset.id=item.id;
    if(item.type==='folder'&&item.color){div.style.background=item.color;div.style.borderColor=shadeColor(item.color,-20);}
    const visual=item.imgData?`<img class="card-img" src="${item.imgData}">`:`<div class="card-emoji">${item.emoji||DEFAULT_EMOJI}</div>`;
    div.innerHTML=`<div class="drag-handle" title="拖曳排序">⠿</div><div class="card-edit-overlay"></div>${visual}<div class="card-label">${item.label}</div><div class="card-edit-btns"><button class="btn ghost" style="font-size:12px;padding:4px 10px" onclick="editItem('${item.id}',event)">✎ 編輯</button><button class="btn danger-outline" style="font-size:12px;padding:4px 10px" onclick="confirmDelete('${item.id}','${item.label}',event)">✕ 刪除</button></div>`;
    div.setAttribute('draggable','true');
    div.addEventListener('dragstart',e=>{if(!editMode){e.preventDefault();return;}dragSrcId=item.id;div.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    div.addEventListener('dragend',()=>{div.classList.remove('dragging');document.querySelectorAll('.card').forEach(c=>c.classList.remove('drag-over'));});
    div.addEventListener('dragover',e=>{if(!editMode||dragSrcId===item.id)return;e.preventDefault();e.dataTransfer.dropEffect='move';document.querySelectorAll('.card').forEach(c=>c.classList.remove('drag-over'));div.classList.add('drag-over');});
    div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
    div.addEventListener('drop',e=>{if(!editMode||dragSrcId===item.id)return;e.preventDefault();div.classList.remove('drag-over');const children=currentFolder().children;const fromIdx=children.findIndex(c=>c.id===dragSrcId);const toIdx=children.findIndex(c=>c.id===item.id);if(fromIdx<0||toIdx<0)return;const[moved]=children.splice(fromIdx,1);children.splice(toIdx,0,moved);dragSrcId=null;render();});
    div.addEventListener('click',()=>{if(!editMode)handleCardClick(item);});
    grid.appendChild(div);
  });
}
function renderSentence(){const el=document.getElementById('sentence-tokens');el.innerHTML=state.sentence.map((t,i)=>`<span class="token">${t}<button onclick="removeToken(${i})">×</button></span>`).join('');}
function handleCardClick(item){if(item.type==='folder'){state.path.push(item.id);render();}else{state.sentence.push(item.label);renderSentence();speak(item);}}
function speak(item){if(item.audio){new Audio(item.audio).play();}else if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(item.label);u.lang='zh-TW';speechSynthesis.speak(u);}}
function removeToken(i){state.sentence.splice(i,1);renderSentence();}
document.getElementById('btn-clear-sentence').onclick=()=>{state.sentence=[];renderSentence();};
document.getElementById('btn-speak-sentence').onclick=()=>{const text=state.sentence.join('，');if(!text)return;if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(text);u.lang='zh-TW';speechSynthesis.speak(u);}};
document.getElementById('btn-new-folder').onclick=()=>openModal('folder');
document.getElementById('btn-new-card').onclick=()=>openModal('card');
const fLabel=document.getElementById('f-label');
let emojiTimer=null;
fLabel.oninput=()=>{
  if(state.tempImg)return;
  clearTimeout(emojiTimer);
  emojiTimer=setTimeout(()=>{
    const emoji=lookupEmoji(fLabel.value);
    state.tempEmoji=emoji;
    document.getElementById('emoji-preview-big').textContent=emoji;
    const found=emoji!==DEFAULT_EMOJI;
    document.getElementById('emoji-status-label').textContent=found?'自動對應成功':'找不到對應，顯示為 ❓';
    document.getElementById('emoji-status-value').textContent=fLabel.value.trim()?`「${fLabel.value.trim()}」→ ${emoji}`:'';
  },300);
};
function buildColorGrid(c0){const grid=document.getElementById('color-grid');grid.innerHTML='';selectedColor=c0||FOLDER_COLORS[4];FOLDER_COLORS.forEach(c=>{const sw=document.createElement('div');sw.className='color-swatch'+(c===selectedColor?' selected':'');sw.style.background=c;sw.onclick=()=>{selectedColor=c;document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));sw.classList.add('selected');};grid.appendChild(sw);});}
function openModal(mode,item){
  state.modalMode=mode;state.editTarget=item||null;state.tempAudio=item?.audio||null;state.tempImg=item?.imgData||null;
  state.tempEmoji=item?.emoji||DEFAULT_EMOJI;
  document.getElementById('modal-title').textContent=item?(mode==='folder'?'編輯資料夾':'編輯圖卡'):(mode==='folder'?'新增資料夾':'新增圖卡');
  fLabel.value=item?.label||'';
  document.getElementById('fg-color').style.display=mode==='folder'?'':'none';
  document.getElementById('fg-audio').style.display=mode==='folder'?'none':'';
  if(mode==='folder')buildColorGrid(item?.color||FOLDER_COLORS[4]);
  document.getElementById('emoji-preview-big').textContent=state.tempEmoji;
  document.getElementById('emoji-status-label').textContent=item?'目前圖示':'輸入名稱後自動對應';
  document.getElementById('emoji-status-value').textContent=item?`「${item.label}」→ ${state.tempEmoji}`:'';
  const prevWrap=document.getElementById('img-preview-wrap');
  if(state.tempImg){document.getElementById('img-preview').src=state.tempImg;prevWrap.style.display='flex';}else prevWrap.style.display='none';
  updateAudioLabel();
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>fLabel.focus(),50);
}
function updateAudioLabel(){const fname=document.getElementById('audio-fname'),pbtn=document.getElementById('btn-preview-audio');if(state.tempAudio){fname.textContent='已載入語音檔案';pbtn.style.display='inline-flex';}else{fname.textContent='尚未選擇（將使用語音合成）';pbtn.style.display='none';}}
document.getElementById('f-img').onchange=function(){const file=this.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{state.tempImg=e.target.result;document.getElementById('img-preview').src=state.tempImg;document.getElementById('img-preview-wrap').style.display='flex';};reader.readAsDataURL(file);};
document.getElementById('btn-remove-img').onclick=()=>{state.tempImg=null;document.getElementById('f-img').value='';document.getElementById('img-preview-wrap').style.display='none';const emoji=lookupEmoji(fLabel.value);state.tempEmoji=emoji;document.getElementById('emoji-preview-big').textContent=emoji;};
document.getElementById('f-audio').onchange=function(){const file=this.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{state.tempAudio=e.target.result;updateAudioLabel();};reader.readAsDataURL(file);};
document.getElementById('btn-clear-audio').onclick=()=>{state.tempAudio=null;updateAudioLabel();};
document.getElementById('btn-preview-audio').onclick=()=>{if(state.tempAudio)new Audio(state.tempAudio).play();};
document.getElementById('modal-cancel').onclick=closeModal;
document.getElementById('modal').onclick=e=>{if(e.target===document.getElementById('modal'))closeModal();};
function closeModal(){document.getElementById('modal').style.display='none';document.getElementById('f-img').value='';document.getElementById('f-audio').value='';}
document.getElementById('modal-save').onclick=()=>{
  const label=fLabel.value.trim();if(!label){fLabel.focus();return;}
  const folder=currentFolder();
  if(state.editTarget){const item=findById(state.tree,state.editTarget.id);item.label=label;item.emoji=state.tempEmoji;item.imgData=state.tempImg;if(state.modalMode==='folder')item.color=selectedColor;if(state.modalMode==='card')item.audio=state.tempAudio;}
  else{folder.children.push({id:uid(),type:state.modalMode,label,emoji:state.tempEmoji,imgData:state.tempImg,color:state.modalMode==='folder'?selectedColor:undefined,children:state.modalMode==='folder'?[]:undefined,audio:state.modalMode==='card'?state.tempAudio:undefined});}
  closeModal();render();
};
function confirmDelete(id,label,e){e.stopPropagation();deleteTargetId=id;document.getElementById('confirm-msg').textContent=`確定要刪除「${label}」嗎？此動作無法復原。`;document.getElementById('confirm-modal').style.display='flex';}
document.getElementById('confirm-cancel').onclick=()=>{document.getElementById('confirm-modal').style.display='none';deleteTargetId=null;};
document.getElementById('confirm-ok').onclick=()=>{if(deleteTargetId){const parent=findParent(state.tree,deleteTargetId);if(parent)parent.children=parent.children.filter(c=>c.id!==deleteTargetId);deleteTargetId=null;}document.getElementById('confirm-modal').style.display='none';render();};
function editItem(id,e){e.stopPropagation();const item=findById(state.tree,id);openModal(item.type,item);}
function findById(node,id){if(node.id===id)return node;if(node.children)for(const c of node.children){const f=findById(c,id);if(f)return f;}return null;}
function findParent(tree,id){if(tree.children){for(const c of tree.children){if(c.id===id)return tree;const f=findParent(c,id);if(f)return f;}}return null;}
render();
</script>
